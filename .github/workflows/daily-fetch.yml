# 매일 한국시간 오전 8시경 4개 플랫폼 랭킹·히스토리 JSON 갱신 (UTC 23:00 = KST 익일 08:00)
name: Daily fetch rankings

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - run: npm run fetch:live

      - name: Commit updated JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/today_womens_rankings.json src/historical_trends.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: daily platform rankings (KST snapshot)"
            git push
          fi
